<!DOCTYPE html>
<html lang="en">
<head>
    <title>Midrash Madness - Bracket</title>
    <link rel="icon" href="MMLogoNoBackground.png" />
    <link href="styles.css" rel="stylesheet">
    <link href="bracketPage.css" rel="stylesheet" />
    <script src="bracketPage.js" defer></script>
</head>
<body>
    <nav class="nav active">
        <div class="container">
            <img id="logo" src="MMLogoNoBackground.png" alt="logo" width="65px" height="50px">
            <ul>
                <li id="home"><a href="index.html">Home</a></li>
                <li id="bracket">Bracket</li>
            </ul>
        </div>
    </nav>

    <h1>Fill Out Your Bracket</h1>

    <div id="round-controls">
        <button id="back-btn" class="ctrl-btn" style="display:none;">&larr; Back</button>
        <span id="round-label">Round 1 of 6</span>
        <span id="progress-counter" class="ctrl-btn ctrl-btn-counter" style="display:none;"></span>
        <button id="advance-btn" class="ctrl-btn" style="display:none;">Advance to Next Round &rarr;</button>
        <button id="submit-inline-btn" class="ctrl-btn ctrl-btn-submit" style="display:none;">Submit Your Bracket</button>
    </div>

    <!-- Bracket image + overlay container — populated by JS -->
    <div id="bracket-wrapper">
        <div id="bracket-loading">Loading bracket data&hellip;</div>
    </div>

    <!-- Matchup Modal -->
    <div id="matchup-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <button class="modal-close" id="modal-close-btn">&times;</button>
            <h2 class="modal-title">Choose the Winner</h2>
            <p class="modal-subtitle">Which Midrash do more people believe is written explicitly in the Torah?</p>
            <div class="modal-contestants">
                <div class="contestant-card" id="contestant-a">
                    <div class="contestant-seed" id="seed-a"></div>
                    <div class="contestant-desc" id="desc-a"></div>
                    <div class="contestant-source" id="source-a"></div>
                    <button class="pick-btn ripple" id="pick-a">Pick This One</button>
                </div>
                <div class="vs-divider">VS</div>
                <div class="contestant-card" id="contestant-b">
                    <div class="contestant-seed" id="seed-b"></div>
                    <div class="contestant-desc" id="desc-b"></div>
                    <div class="contestant-source" id="source-b"></div>
                    <button class="pick-btn ripple" id="pick-b">Pick This One</button>
                </div>
            </div>
            <div class="modal-ok-row">
                <button class="ok-btn ripple" id="matchup-ok-btn" disabled>Confirm Pick</button>
            </div>
        </div>
    </div>

    <!-- Submit Modal -->
    <div id="submit-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box submit-modal-box">
            <button class="modal-close" id="submit-modal-close">&times;</button>
            <h2 class="modal-title">Submit Your Bracket</h2>
            <p class="modal-subtitle">Enter your details to be notified of the results!</p>
            <div id="submit-error" class="submit-error" style="display:none;"></div>
            <div class="submit-form">
                <input type="text"  id="submit-name"  placeholder="Your Name"          class="form-input" />
                <input type="email" id="submit-email" placeholder="Your Email Address"  class="form-input" />
                <button class="pick-btn ripple" id="submit-confirm-btn">Submit Bracket</button>
            </div>
        </div>
    </div>
</body>
</html>
